<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>libreshare</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="app.css">
  <!-- Adsterra Social Bar -->
  <script src="https://pl30320985.effectivecpmnetwork.com/fb/85/0a/fb850a4502c057a8dacdcc5141944bd9.js"></script>
  <!-- Adsterra Popunder -->
  <script src="https://pl30320983.effectivecpmnetwork.com/27/11/71/27117169209fd4bd9552c7b569d8ee28.js"></script>
</head>
<body>
  <header>
    <span class="brand">libreshare</span>
    <span class="tag" data-i18n="header.tag">end-to-end encrypted file sharing</span>
    <nav>
      <a href="#" id="nav-new" data-i18n="nav.new">new</a>
      <a href="#" id="nav-inbox" data-i18n="nav.inbox">inbox</a>
      <a href="#" id="nav-clear" data-i18n="nav.clear">clear</a>
      <a href="#" id="nav-about" data-i18n="nav.about">about</a>
      <span class="lang">
        <a href="#" class="lang-pick" data-lang="en">EN</a>
        <a href="#" class="lang-pick" data-lang="ko">한국어</a>
      </span>
    </nav>
  </header>

  <main>
    <!-- Upload view -->
    <section id="upload" hidden>
      <p class="lead" data-i18n="upload.lead"></p>
      <form id="upload-form">
        <div class="row">
          <label for="file" data-i18n="upload.file"></label>
          <input type="file" id="file" required>
        </div>
        <div class="row">
          <label for="servers" data-i18n="upload.servers"></label>
          <input type="text" id="servers" value="https://blossom.band,https://blossom.nostr.build"
                 spellcheck="false" autocomplete="off">
          <span class="hint" data-i18n="upload.serversHint"></span>
        </div>
        <div class="row">
          <label for="max-part" data-i18n="upload.maxPart"></label>
          <input type="number" id="max-part" min="1" step="1" style="min-width:80px"
                 data-i18n-placeholder="upload.maxPartAuto">
          <span class="hint" data-i18n="upload.maxPartHint"></span>
        </div>
        <div class="row">
          <label></label>
          <span class="check">
            <input type="checkbox" id="embed-servers">
            <label for="embed-servers" data-i18n="upload.embedServers"></label>
          </span>
          <span class="hint" data-i18n="upload.embedServersHint"></span>
        </div>
        <div class="row">
          <label></label>
          <span class="check">
            <input type="checkbox" id="embed-meta" checked>
            <label for="embed-meta" data-i18n="upload.embedMeta"></label>
          </span>
          <span class="hint" data-i18n="upload.embedMetaHint"></span>
        </div>
        <div class="row">
          <label></label>
          <button type="submit" id="go" data-i18n="upload.submit"></button>
        </div>
      </form>
      <div id="up-progress" class="progress" hidden></div>
      <progress id="up-bar" class="bar" max="100" hidden></progress>
      <div id="up-result" class="result" hidden>
        <p data-i18n="result.linkNote"></p>
        <textarea id="link" readonly rows="3"></textarea>
        <button id="copy" data-i18n="result.copy"></button>
        <span id="copied" class="ok-note" data-i18n="result.copied" hidden></span>

        <div class="share">
          <p data-i18n="share.note"></p>
          <div class="row">
            <label for="recip" data-i18n="share.to"></label>
            <input type="text" id="recip" data-i18n-placeholder="share.recipPlaceholder"
                   spellcheck="false" autocomplete="off">
          </div>
          <div class="row">
            <label for="send-relays" data-i18n="share.relays"></label>
            <input type="text" id="send-relays" value="wss://relay.damus.io,wss://nos.lol"
                   spellcheck="false" autocomplete="off">
            <span class="hint" data-i18n="share.relaysHint"></span>
          </div>
          <div class="row">
            <label for="sender" data-i18n="share.from"></label>
            <input type="text" id="sender" data-i18n-placeholder="share.senderPlaceholder"
                   spellcheck="false" autocomplete="off">
            <span class="hint" data-i18n="share.senderHint"></span>
          </div>
          <div class="row">
            <label></label>
            <button id="send-nostr" type="button" data-i18n="share.send"></button>
            <span id="send-status" class="ok-note" hidden></span>
          </div>
          <div id="send-error" class="error" hidden></div>
        </div>
      </div>
    </section>

    <!-- Inbox view -->
    <section id="inbox" hidden>
      <p class="lead" data-i18n="inbox.lead"></p>
      <div class="row">
        <label for="my-nsec" data-i18n="inbox.nsec"></label>
        <input type="text" id="my-nsec" data-i18n-placeholder="inbox.nsecPlaceholder"
               spellcheck="false" autocomplete="off">
        <span class="hint" data-i18n="inbox.nsecHint"></span>
      </div>
      <div class="row">
        <label for="inbox-relays" data-i18n="inbox.relays"></label>
        <input type="text" id="inbox-relays" value="wss://relay.damus.io,wss://nos.lol"
               spellcheck="false" autocomplete="off">
      </div>
      <div class="row">
        <label></label>
        <button id="check-inbox" type="button" data-i18n="inbox.check"></button>
      </div>
      <div id="gen-id-out" class="result" hidden></div>
      <div id="inbox-progress" class="progress" hidden></div>
      <div id="inbox-error" class="error" hidden></div>
      <ul id="inbox-list" class="inbox-list"></ul>
    </section>

    <!-- Download view -->
    <section id="download" hidden>
      <table class="meta">
        <tr><td data-i18n="download.name"></td><td id="d-name">—</td></tr>
        <tr><td data-i18n="download.type"></td><td id="d-mime">—</td></tr>
        <tr><td data-i18n="download.size"></td><td id="d-size">—</td></tr>
        <tr><td data-i18n="download.blob"></td><td id="d-hash" class="mono">—</td></tr>
      </table>
      <button id="download-btn" data-i18n="download.submit"></button>
      <div id="dl-progress" class="progress" hidden></div>
      <progress id="dl-bar" class="bar" max="100" hidden></progress>
      <div id="dl-error" class="error" hidden></div>
    </section>

    <!-- About -->
    <section id="about" hidden>
      <p data-i18n="about.p1"></p>
      <p data-i18n="about.p2"></p>
      <p class="warn" data-i18n="about.warn"></p>
    </section>
  </main>

  <footer data-i18n="footer.text"></footer>

  <!-- Floating upload progress: lives outside <main>'s sections so switching
       nav (inbox/about) never hides it. Click to jump back to the upload. -->
  <div id="up-float" class="up-float" hidden role="status" aria-live="polite"
       tabindex="0" data-i18n-title="upload.floatReturn">
    <progress id="up-float-bar" class="bar" max="100"></progress>
    <span id="up-float-text"></span>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
